<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Furniture Website</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Header part -->
    <header>
      <nav class="navbar flex between wrapper">
        <a href="#" class="logo">FURNIX.</a>

        <ul class="nav-icons flex">
          <li>
            <a href="#" class="icon">
              <i class="fa-solid fa-magnifying-glass"></i>
            </a>
          </li>
          <li>
            <a href="#" class="icon">
              <i class="fa-solid fa-user"></i>
            </a>
          </li>
          <li>
            <a href="#" class="icon">
              <i class="fa-solid fa-bag-shopping"></i>
            </a>
          </li>
          <li>
            <a href="#" class="icon">
              <i class="fa-solid fa-bars"></i>
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- sections part -->
    <main>
      <section class="hero-section wrapper flex">
        <div class="hero-content">
          <h1 class="h1-heading"><span>INOVA</span>TION</h1>
          <p class="big-para">Design Your Space</p>
          <a href="#" class="btn golden-bg">Buy Now</a>

          <div class="hero-image mt">
            <img src="./images/sofa.png" />
          </div>
        </div>
      </section>
    </main>

    <!-- footer part -->
    <footer></footer>
  </body>
</html>
